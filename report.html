<!DOCTYPE html>
<html>
<head>
    <title>Report Item</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:50%;
    margin:auto;
    margin-top:40px;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 0px 10px gray;
}

input, textarea, select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:15px;
}

button{
    background:#27ae60;
    color:white;
    border:none;
    padding:10px;
    width:100%;
    font-size:16px;
    border-radius:5px;
}

button:hover{
    background:#219150;
}

a{
    text-decoration:none;
}

.back{
    display:block;
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<header>
<h1>Report Lost or Found Item</h1>
</header>

<div class="container">

<form method="POST">

<label>Item Name</label>
<input type="text" name="title" placeholder="Enter item name" required>

<label>Description</label>
<textarea name="description" placeholder="Describe the item"></textarea>

<label>Location</label>
<input type="text" name="location" placeholder="Where was it lost or found?" required>

<label>Status</label>

<select name="type">
<option value="lost">Lost Item</option>
<option value="found">Found Item</option>
</select>

<button type="submit">Submit Report</button>

</form>

<a href="/" class="back">⬅ Back to Home</a>

</div>

</body>
</html>
