<!DOCTYPE html>
<html>
<head>
    <title>Register - Lost & Found Portal</title>

<style>

body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#2c3e50;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:40%;
    margin:auto;
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0px 0px 10px gray;
}

input{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    background:#27ae60;
    color:white;
    border:none;
    font-size:16px;
    border-radius:5px;
}

button:hover{
    background:#219150;
}

.links{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#3498db;
}

</style>

</head>

<body>

<header>
<h1>Lost & Found Portal</h1>
</header>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<label>Name</label>
<input type="text" name="name" placeholder="Enter your name" required>

<label>Email</label>
<input type="email" name="email" placeholder="Enter your email" required>

<label>Password</label>
<input type="password" name="password" placeholder="Create password" required>

<button type="submit">Register</button>

</form>

<div class="links">

<p>Already have an account?</p>

<a href="/login">Login Here</a>

<br><br>

<a href="/">⬅ Back to Home</a>

</div>

</div>

</body>
</html>
